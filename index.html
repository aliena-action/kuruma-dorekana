function cleanupControllers(){if(sampleController){sampleController.cleanup();sampleController=null}activeControllers.forEach(c=>c.cleanup());activeControllers=[];choiceControllers=new WeakMap()}
function resetChoiceEntry(){el.choices.getAnimations().forEach(a=>a.cancel());el.choices.classList.remove('groupIn');el.choices.style.animation='';el.choices.style.transform='';el.choices.onanimationend=null}
function stopChoiceEntry(){if(!el.choices.classList.contains('groupIn'))return;let entry=el.choices.getAnimations().find(a=>a.animationName==='choiceGroupDrive');if(entry)entry.pause();let t=getComputedStyle(el.choices).transform;el.choices.getAnimations().forEach(a=>{if(a.animationName==='choiceGroupDrive')a.cancel()});el.choices.style.animation='none';el.choices.style.transform=t==='none'?'translateX(0)':t;el.choices.classList.remove('groupIn');el.choices.onanimationend=null}
function choiceButtons(){return [...el.choices.querySelectorAll('button.choice')]}
function createChoiceButton(c,i,extraClass=''){let b=document.createElement('button');b.className=('choice '+extraClass).trim();b.type='button';b.dataset.choiceIndex=i;b.style.setProperty('--choice-center',CHOICE_CENTERS[i]+'px');let ctrl;if(c.rescue){b.innerHTML=wreckerCarMarkup(i);ctrl=new WreckerController(b)}else{b.innerHTML=animatedCar(c,i);ctrl=new LayeredCarController(b,c,i)}choiceControllers.set(b,ctrl);activeControllers.push(ctrl);ctrl.init();b.onclick=()=>tap(b,c);return b}
function renderChoices(choices){if(choices[0].rescue){let scene=document.createElement('div'),wreckerButton=createChoiceButton(choices[0],0,'wreckerHitArea'),cargoButton=createChoiceButton(choices[1],1,'cargoHitArea');scene.className='wreckerScene';scene.appendChild(wreckerButton);scene.appendChild(cargoButton);el.choices.appendChild(scene);let ctrl=choiceControllers.get(wreckerButton);if(ctrl)ctrl.scene=scene;el.choices.appendChild(createChoiceButton(choices[2],2,'correctChoice'));return}choices.forEach((c,i)=>el.choices.appendChild(createChoiceButton(c,i)))}
function setDebugWreckerPhase(phase){let buttons=choiceButtons(),wreckerButton=buttons[0],cargo=buttons[1],ctrl=choiceControllers.get(wreckerButton);if(!ctrl||!wreckerButton)return;ctrl.clearTimers();ctrl.busy=phase!=='idle';if(phase==='idle'){ctrl.setTowState('idle','normal','normal');return}ctrl.setBackTravel();wreckerButton.style.transform=`translateX(${WRECKER_BACK_X}px)`;wreckerButton.classList.add('wreckerBacking');if(phase==='backStopped')ctrl.setTowState('backStopped','normal','normal');else if(phase==='tow01')ctrl.setTowState('tow01','tow01','fun');else{ctrl.setTowState(phase==='lifted'?'lifted':'tow02','tow02','fun');if(phase==='lifted'){cargo.classList.add('wreckerHooked','wreckerLifted')}}}
function renderDebugScenario(){openingFinished=true;openingPhase='done';clearOpeningTimers();clearOpeningListeners();el.title.classList.add('hide');el.play.classList.remove('hide');updatePlayStageLayout();cleanupControllers();resetChoiceEntry();el.choices.innerHTML='';el.sample.classList.add('sampleIdle');sample=cars[0];last=sample.id;el.sample.innerHTML=sampleCar(sample);let s=el.sample.firstChild;sampleController=new LayeredCarController(s,sample,0,{blink:true});sampleController.init();let wrong=cars.find(c=>c.id==='blue'),choices=debugMode==='wrecker'?[wreckerCar,wrong,sample]:debugMode==='dump'?[guestCar,wrong,sample]:[cars.find(c=>c.id==='yellow'),sample,cars.find(c=>c.id==='green')];renderChoices(choices);if(debugMode==='wrecker')requestAnimationFrame(()=>setDebugWreckerPhase(debugPhase));lock=false}
function startDebugScenario(){Promise.all([preloadCarAssets('red'),preloadCarAssets('blue'),preloadCarAssets('yellow'),preloadCarAssets('green'),preloadGuestAssets(),preloadWreckerAssets()]).then(renderDebugScenario)}
function q(){lock=false;if(showTimer)clearTimeout(showTimer);cleanupControllers();resetChoiceEntry();el.choices.innerHTML='';el.sample.classList.remove('sampleIdle');rareThisQuestion=selectRareEvent();let pool=cars.filter(c=>c.id!==last);sample=pool[rnd(pool.length)]||cars[0];last=sample.id;el.sample.innerHTML=sampleCar(sample);let s=el.sample.firstChild;sampleController=new LayeredCarController(s,sample,0,{blink:false});sampleController.init();s.classList.add('sampleIn');s.onanimationend=e=>{if(e.animationName!=='sampleDrive')return;s.classList.remove('sampleIn');el.sample.classList.add('sampleIdle');if(sampleController)sampleController.enableBlink()};showTimer=setTimeout(show,CHOICE_START_DELAY_MS)}
function show(){let others=shuffle(cars.filter(c=>c.id!==sample.id)),choices;if(rareThisQuestion==='wrecker'&&wreckerAssetsReady)choices=[wreckerCar,others[0],sample];else if(rareThisQuestion==='dump'&&guestAssetsReady)choices=[guestCar,...shuffle([sample,others[0]])];else choices=shuffle([sample,...others.slice(0,2)]);renderChoices(choices);void el.choices.offsetWidth;el.choices.classList.add('groupIn');el.choices.onanimationend=e=>{if(e.animationName==='choiceGroupDrive')resetChoiceEntry()};lock=false}
function tap(b,c){if(lock)return;if(c.rescue)rescueGuest(b);else if(c.guest)guest(b);else if(c.id===sample.id)ok(b);else ng(b)}
function guest(b){if(b.classList.contains('guestActive')||b.classList.contains('guestExiting')||b.classList.contains('guestGone'))return;let ctrl=choiceControllers.get(b);if(ctrl&&ctrl.playFunPair(()=>exitGuest(b,ctrl))){playGameSound('dump');b.classList.add('guestActive')}}
function exitGuest(b,ctrl){if(ctrl.disposed)return;b.classList.remove('guestActive');b.classList.add('guestExiting');let root=b.querySelector('.carAnimated');if(!root)return;root.classList.remove('dumpExit');void root.offsetWidth;root.classList.add('dumpExit');let done=e=>{if(e.animationName!=='dumpExit')return;root.removeEventListener('animationend',done);ctrl.cleanup();choiceControllers.delete(b);b.classList.remove('guestExiting');b.classList.add('guestGone');b.disabled=true;b.innerHTML=''};root.addEventListener('animationend',done)}
function rescueGuest(b){if(b.classList.contains('rescueActive'))return;let choices=choiceButtons(),middle=choices[1],correct=choices[2],ctrl=choiceControllers.get(b);if(choices[0]!==b||!middle||!correct||!ctrl)return;unlockFallbackGameAudio();unlockGameAudio();lock=true;choices.forEach(choice=>choice.disabled=true);if(ctrl.playTow(middle,()=>finishWreckerRescue(b,middle,correct,ctrl)))b.classList.add('rescueActive');else{lock=false;choices.forEach(choice=>choice.disabled=false)}}
function finishWreckerRescue(b,middle,correct,ctrl){if(ctrl.disposed)return;let scene=b.closest('.wreckerScene');if(scene)scene.classList.add('rescueGone');else{b.classList.add('rescueGone');middle.classList.add('rescueGone')}b.disabled=true;middle.disabled=true;wrongStreak=0;ok(correct)}
function ng(b){recordWrongChoice();playGameSound('wrong');let ctrl=choiceControllers.get(b);if(ctrl)ctrl.playWrong();else{b.classList.remove('wiggle');void b.offsetWidth;b.classList.add('wiggle')}}
function ok(b){wrongStreak=0;lock=true;stopChoiceEntry();playGameSound('correct');let ctrl=choiceControllers.get(b);if(ctrl)ctrl.playCorrect();else b.classList.add('jump');if(sampleController)sampleController.playCorrect();choiceButtons().forEach(x=>{if(x!==b)x.classList.add('fade')});setTimeout(q,1700)}
function spark(b){let r=b.getBoundingClientRect();let cx=r.left+r.width/2,cy=r.top+r.height/2;for(let i=0;i<10;i++){let s=document.createElement('span');s.className='spark';s.textContent='✨';s.style.left=cx+'px';s.style.top=cy+'px';let a=Math.PI*2*i/10,d=60+Math.random()*70;s.style.setProperty('--x',Math.cos(a)*d+'px');s.style.setProperty('--y',Math.sin(a)*d-45+'px');document.body.appendChild(s);s.onanimationend=()=>s.remove()}}
preloadAnimatedAssets();
preloadGameAudioData();
if(debugMode)startDebugScenario();else preloadOpeningAssets().then(handleOpeningOrientation);
const openingOrientationQuery=matchMedia('(orientation:portrait)');
if(!debugMode){if(openingOrientationQuery.addEventListener)openingOrientationQuery.addEventListener('change',handleOpeningOrientation);else openingOrientationQuery.addListener(handleOpeningOrientation);window.addEventListener('resize',handleOpeningOrientation)}
window.addEventListener('resize',requestPlayStageLayout);
window.addEventListener('orientationchange',requestPlayStageLayout);
if(window.visualViewport){visualViewport.addEventListener('resize',requestPlayStageLayout);visualViewport.addEventListener('scroll',requestPlayStageLayout)}
el.start.onclick=beginOpeningExit;
updatePlayStageLayout();
if(!debugMode)handleOpeningOrientation();
</script>
</body></html>
