  constructor(button,c,index,{blink=true}={}){this.button=button;this.car=c;this.color=c.id;this.assets=animatedCarAssets[c.id];this.root=button.querySelector('.carAnimated');this.pose=button.querySelector('.carPose');this.img={tire:button.querySelector('.tireLayer'),body:button.querySelector('.bodyLayer'),eye:button.querySelector('.eyeLayer'),effect:button.querySelector('.effectLayer')};this.timers=[];this.blinkTimer=null;this.state='idle';this.disposed=false;this.fallback=!this.assets;this.wrongBusy=false;this.funBusy=false;this.index=index;this.blink=blink}

  playFunPair(done){if(this.funBusy||this.fallback||!this.assets.body.fun01||!this.assets.eye.fun01)return false;let count=0,run=()=>{if(this.disposed)return;count++;this.runSequence('fun',[['fun01',100],['fun01',100],['fun02',200],['fun01',100],['fun01',100]],'funPose',640);this.funBusy=true;if(count<2)this.timers.push(setTimeout(run,640));else this.timers.push(setTimeout(()=>{if(!this.disposed&&done)done()},660))};run();return true}

class WreckerController{
  constructor(button){this.button=button;this.root=button.querySelector('.carAnimated');this.img={body:button.querySelector('.bodyLayer'),tire:button.querySelector('.tireLayer'),eye:button.querySelector('.eyeLayer')};this.timers=[];this.blinkTimer=null;this.exitListener=null;this.backAnimation=null;this.backDistance=0;this.state='idle';this.disposed=false;this.busy=false}

  setBackTravel(middle){let w=this.button.getBoundingClientRect(),t=middle.getBoundingClientRect(),columnSpan=t.left+t.width/2-(w.left+w.width/2),spanProgress=Math.max(0,Math.min(1,(columnSpan-216)/199)),backRatio=.52+spanProgress*.1,distance=Math.max(0,columnSpan*backRatio);this.backDistance=distance;this.button.style.setProperty('--wrecker-back-x',distance.toFixed(2)+'px');return distance}

  startExit(middle,done){if(this.disposed)return;this.setTowState('exiting','tow02','fun');if(this.backAnimation){this.backAnimation.cancel();this.backAnimation=null}let finished=false,finish=()=>{if(finished||this.disposed)return;finished=true;if(this.exitListener){this.button.removeEventListener('animationend',this.exitListener);this.exitListener=null}this.busy=false;done()};this.exitListener=e=>{if(e.target===this.button&&e.animationName==='wreckerLeadExit')finish()};this.button.addEventListener('animationend',this.exitListener);this.button.classList.add('wreckerTowExit');middle.classList.add('wreckerCargoExit');this.timers.push(setTimeout(finish,820))}

function openingIsPortrait(){return matchMedia('(orientation:portrait)').matches}

function setupOpeningCar(){if(openingController)openingController.cleanup();let yellow=cars.find(c=>c.id==='yellow');el.start.innerHTML=layeredCar(yellow,0,{extraClass:'openingCar',effect:false});openingController=new LayeredCarController(el.start,yellow,0,{blink:false});openingController.init()}

function cleanupControllers(){if(sampleController){sampleController.cleanup();sampleController=null}activeControllers.forEach(c=>c.cleanup());activeControllers=[];choiceControllers=new WeakMap()}
function resetChoiceEntry(){el.choices.getAnimations().forEach(a=>a.cancel());el.choices.classList.remove('groupIn');el.choices.style.animation='';el.choices.style.transform='';el.choices.onanimationend=null}

function q(){lock=false;if(showTimer)clearTimeout(showTimer);cleanupControllers();resetChoiceEntry();el.choices.innerHTML='';el.sample.classList.remove('sampleIdle');rareThisQuestion=selectRareEvent();let pool=cars.filter(c=>c.id!==last);sample=pool[rnd(pool.length)]||cars[0];last=sample.id;el.sample.innerHTML=sampleCar(sample);let s=el.sample.firstChild;sampleController=new LayeredCarController(s,sample,0,{blink:false});sampleController.init();s.classList.add('sampleIn');s.onanimationend=e=>{if(e.animationName!=='sampleDrive')return;s.classList.remove('sampleIn');el.sample.classList.add('sampleIdle');if(sampleController)sampleController.enableBlink()};showTimer=setTimeout(show,CHOICE_START_DELAY_MS)}
