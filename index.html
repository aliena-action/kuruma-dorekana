<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<link rel="icon" href="data:,">
<title>くるまどれかな？</title>
<style>
:root{--app-height:100%}
@supports(height:100svh){:root{--app-height:100svh}}
@supports(height:100dvh){:root{--app-height:100dvh}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:var(--app-height);min-height:var(--app-height);overflow:hidden;touch-action:manipulation;-webkit-text-size-adjust:100%}
body{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",Meiryo,sans-serif;color:#4a3f35;background:#77d6ff}
.app{position:fixed;top:0;left:0;right:0;width:100%;height:var(--app-height);overflow:hidden;background-image:url("assets/bg_road_day.png"),linear-gradient(#75d7ff 0 42%,#8ddd65 42% 48%,#b8b8b8 48% 100%);background-size:100% 100%,100% 100%;background-position:center,center;background-repeat:no-repeat}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;min-height:0}
.hide{display:none!important}
.title{justify-content:center;gap:clamp(10px,2.5svh,22px);padding:max(8px,calc(env(safe-area-inset-top) + 1svh)) max(18px,calc(env(safe-area-inset-right) + 5vw)) max(8px,calc(env(safe-area-inset-bottom) + 1svh)) max(18px,calc(env(safe-area-inset-left) + 5vw))}
.logo{display:grid;place-items:center;line-height:.95;text-align:center}
.logoImg{display:none;width:min(72vw,520px);max-height:34svh;object-fit:contain;filter:drop-shadow(0 9px 8px rgba(0,0,0,.18))}
.logoImg.ready{display:block}
.logoText{display:none;font-weight:900;font-size:clamp(34px,8.5vw,76px);letter-spacing:0;text-shadow:0 4px 0 #fff,4px 0 0 #fff,-4px 0 0 #fff,0 -4px 0 #fff,0 9px 10px rgba(0,0,0,.16)}
.logoText.ready{display:inline-block}
.logoText span:nth-child(1){color:#ef3f26}
.logoText span:nth-child(2){color:#1d78d6}
.logoText span:nth-child(3){color:#43ad36}
.lead,.msg{font-weight:900;background:#fffdf6;border:2px solid rgba(74,63,53,.15);border-radius:999px;box-shadow:0 3px 0 rgba(0,0,0,.12);line-height:1.12;text-align:center}
.lead{font-size:clamp(16px,3.2vw,26px);padding:.34em 1.1em}
.lead:empty{display:none}
.start{position:relative;display:grid;place-items:center;width:clamp(74px,18svh,118px);height:clamp(74px,18svh,118px);font:inherit;color:white;background:#e8452a;border:0;border-radius:50%;box-shadow:0 7px 0 #ad301a,0 10px 18px rgba(0,0,0,.18);cursor:pointer}
.start:before{content:"";position:absolute;inset:10%;border-radius:50%;background:rgba(255,255,255,.18)}
.playIcon{position:relative;left:4%;width:0;height:0;border-top:clamp(16px,3.8svh,26px) solid transparent;border-bottom:clamp(16px,3.8svh,26px) solid transparent;border-left:clamp(25px,5.8svh,40px) solid #fff;filter:drop-shadow(0 3px 0 rgba(0,0,0,.15))}
.start:active{transform:translateY(4px);box-shadow:0 2px 0 #ad301a}
.play{position:absolute;inset:0;padding:max(6px,1.4svh) max(12px,calc(env(safe-area-inset-right) + 2.4vw)) max(8px,calc(env(safe-area-inset-bottom) + 1.2svh)) max(12px,calc(env(safe-area-inset-left) + 2.4vw))}
.msg{position:absolute;z-index:5;top:max(5px,calc(env(safe-area-inset-top) + 1svh));left:50%;transform:translateX(-50%);max-width:min(92vw,820px);font-size:clamp(14px,2.7vw,24px);padding:.24em .9em}
.msg:empty{opacity:0;padding:0;border:0;box-shadow:none}
.sampleLane,.choiceLane{position:absolute;left:max(12px,calc(env(safe-area-inset-left) + 2.4vw));right:max(12px,calc(env(safe-area-inset-right) + 2.4vw));min-height:0}
.sampleLane{top:calc(clamp(45px,16svh,123px) + 4px);height:clamp(96px,36svh,230px);display:flex;align-items:end;justify-content:center;pointer-events:none}
.choiceLane{bottom:max(18px,calc(env(safe-area-inset-bottom) + 2.6svh));height:clamp(112px,44svh,260px);display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:clamp(8px,2vw,26px);align-items:end;justify-items:center}
.car{display:block;width:clamp(104px,24vw,230px);height:auto;aspect-ratio:320/230;filter:drop-shadow(0 8px 4px rgba(0,0,0,.16));pointer-events:none}
.assetImg{display:none!important;width:100%;height:100%;object-fit:contain}
.assetImg.ready{display:block!important}
.fallbackSvg{display:none;width:100%;height:100%}
.fallbackSvg.ready{display:block}
.sample .car{width:clamp(104px,24vw,230px)}
.sampleDriveWrap{display:block}
.sampleMirror{display:block;transform:scaleX(-1)}
.sample .carPose{animation:none;transform:none}
.choice{width:min(100%,clamp(126px,26vw,260px));height:100%;max-height:190px;min-height:96px;display:flex;align-items:end;justify-content:center;border:0;background:transparent;border-radius:24px;padding:clamp(6px,1.4svh,14px) clamp(8px,1.6vw,18px);cursor:pointer}
.choice .car{width:clamp(100px,21vw,220px);max-height:100%}
.choiceLane.groupIn{animation:choiceGroupDrive 3.8s ease-in-out both}
.choiceLane.groupIn .carPose{animation:choiceToddle .95s ease-in-out infinite}
.sampleIn{animation:sampleDrive 3.2s ease-in-out both}
.wiggle{animation:becon .5s ease}
.jump{animation:jump .72s cubic-bezier(.2,1.4,.35,1)}
.carAnimated{position:relative;aspect-ratio:1/1;width:clamp(130px,24vw,250px);max-width:100%;max-height:100%}
.carPose{display:block;position:relative;width:100%;height:100%;animation:idlePose 2.6s ease-in-out infinite;animation-delay:var(--idle-delay,0s);transform-origin:50% 82%}
.carPose.correctPose{animation:correctPose .7s ease-out both}
.carPose.wrongPose{animation:wrongPose .36s ease-out both}
.carPose.funPose{animation:funPose .62s ease-out both}
.carLayerCanvas{position:absolute;inset:0;opacity:0;transition:opacity .12s ease}
.carAnimated.layeredReady .carLayerCanvas{opacity:1}
.carLayer{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
.effectLayer{display:none;opacity:0;transform:scale(.9);transform-origin:50% 52%}
.effectLayer.on{display:block;animation:effectPop .58s ease-out both}
.fallbackFull{display:none!important;width:100%;height:100%;object-fit:contain}
.carAnimated:not(.layeredReady) .fallbackFull.ready,.carAnimated.layerFallback .fallbackFull.ready{display:block!important}
.carAnimated.layeredReady .fallbackFull{display:none!important}
.carAnimated.layerFallback .carLayerCanvas{display:none}
.fade{opacity:.25;transform:scale(.88);transition:.3s}
.spark{position:absolute;font-size:clamp(22px,5vw,40px);animation:spark .8s ease-out forwards;pointer-events:none}
.rotate{display:none;position:fixed;inset:0;z-index:20;align-items:center;justify-content:center;text-align:center;background:#fffdf6;font-size:7vw;font-weight:900}
@media(max-height:360px) and (orientation:landscape){
  .title{gap:clamp(6px,1.5svh,12px)}
  .logoImg{width:min(66vw,420px);max-height:31svh}
  .logoText{font-size:clamp(30px,7.6vw,64px)}
  .lead{font-size:clamp(14px,2.7vw,22px);padding:.3em 1em}
  .start{width:clamp(64px,17svh,92px);height:clamp(64px,17svh,92px)}
  .play{padding-top:5px}
  .msg{font-size:clamp(13px,2.5vw,21px);padding:.22em .85em}
  .sampleLane{top:calc(clamp(43px,16svh,58px) + 4px);height:clamp(96px,36svh,130px)}
  .choiceLane{bottom:max(26px,calc(env(safe-area-inset-bottom) + 7svh));height:clamp(110px,42svh,154px)}
  .sample .car{width:clamp(92px,19vw,164px)}
  .choice{min-height:92px;max-height:160px;padding:5px clamp(6px,1.2vw,12px)}
  .choice .car{width:clamp(96px,20vw,200px)}
  .choice .carAnimated{width:min(clamp(128px,24vw,210px),calc(58svh - 14px));max-height:calc(42svh - 10px)}
}
@media(orientation:portrait){.rotate{display:flex}.app{filter:blur(3px)}}
@keyframes choiceGroupDrive{0%{opacity:1;transform:translateX(110vw)}18%{transform:translateX(82vw)}38%{transform:translateX(55vw)}60%{transform:translateX(28vw)}82%{transform:translateX(8vw)}100%{opacity:1;transform:translateX(0)}}
@keyframes choiceToddle{0%,100%{transform:translateY(0)}25%{transform:translateY(-3px)}50%{transform:translateY(2px)}75%{transform:translateY(-2px)}}
@keyframes sampleDrive{0%{opacity:1;transform:translateX(-110vw) translateY(0)}18%{transform:translateX(-78vw) translateY(-2px)}36%{transform:translateX(-50vw) translateY(2px)}54%{transform:translateX(-26vw) translateY(-2px)}74%{transform:translateX(-8vw) translateY(2px)}100%{opacity:1;transform:translateX(0) translateY(0)}}
@keyframes idlePose{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.006)}}
@keyframes correctPose{0%{transform:translateY(0) scale(1)}18%{transform:translateY(2px) scale(1.02,.96)}52%{transform:translateY(-10px) scale(.99,1.04)}76%{transform:translateY(-2px) scale(1.01,.99)}100%{transform:translateY(0) scale(1)}}
@keyframes wrongPose{0%,100%{transform:translateY(0) scale(1)}35%{transform:translateY(4px) scale(1.04,.9)}70%{transform:translateY(1px) scale(.98,1.03)}}
@keyframes funPose{0%,100%{transform:translateY(0) scale(1) rotate(0)}18%{transform:translateY(2px) scale(1.02,.97) rotate(-1.4deg)}48%{transform:translateY(-5px) scale(.99,1.03) rotate(1.2deg)}72%{transform:translateY(1px) scale(1.01,.98) rotate(-.8deg)}}
@keyframes effectPop{0%{opacity:0;transform:scale(.8)}22%{opacity:.9;transform:scale(1.04)}100%{opacity:0;transform:scale(1.18)}}
@keyframes becon{0%,100%{transform:translateX(0) scale(1)}28%{transform:translateX(-5px) scale(1.06,.9)}52%{transform:translateX(4px) scale(.96,1.05)}76%{transform:translateX(-2px) scale(1.02,.98)}}
@keyframes jump{0%,100%{transform:translateY(0) scale(1)}35%{transform:translateY(-34px) scale(1.08)}60%{transform:translateY(4px) scale(.98)}}
@keyframes spark{from{opacity:1;transform:translate(0,0) scale(.7)}to{opacity:0;transform:translate(var(--x),var(--y)) scale(1.25)}}
</style>
</head>
<body>
<div class="app" id="app">
<section class="screen title" id="title"><h1 class="logo"><img class="logoImg" src="assets/logo_kuruma_dorekana.png" alt="くるまどれかな？" onload="this.classList.add('ready')" onerror="var t=this.nextElementSibling;this.remove();if(t)t.classList.add('ready')"><span class="logoText"><span>くるま</span><span>どれ</span><span>かな?</span></span></h1><p class="lead" aria-hidden="true"></p><button class="start" id="start" aria-label="はじめる"><span class="playIcon" aria-hidden="true"></span></button></section>
<section class="screen play hide" id="play"><div class="msg" id="msg" aria-live="polite"></div><div class="sampleLane"><div class="sample" id="sample"></div></div><div class="choiceLane" id="choices"></div></section>
</div><div class="rotate">📱↻<br>よこむきに してね</div>
<script>
const cars=[
  {id:'red',src:'assets/car_red_full.png',color:'#ef3020'},
  {id:'blue',src:'assets/car_blue_full.png',color:'#1976d2'},
  {id:'yellow',src:'assets/car_yellow_full.png',color:'#f5bd16'},
  {id:'green',src:'assets/car_green_full.png',color:'#45aa35'}
];
const guestCar={id:'dump',color:'#7d756b',guest:true};
const animatedBaseColors=['blue','green','red','yellow'];
const animatedColors=[...animatedBaseColors,guestCar.id];
const animatedEffects={correct:'assets/animation/Effect/Eff_correct.png',wrong:'assets/animation/Effect/Eff_wrong.png',fun:'assets/animation/Effect/Eff_fun.png'};
const animatedCarAssets=Object.fromEntries(animatedColors.map(id=>{
  const base=`assets/animation/cars/car_${id}/car_${id}_`;
  let assets={
    body:{normal:base+'body_normal.png',correct01:base+'body_correct_01.png',correct02:base+'body_correct_02.png',correct03:base+'body_correct_03.png',wrong01:base+'body_wrong_01.png',wrong02:base+'body_wrong_02.png'},
    eye:{normal:base+'eye_normal.png',blink:base+'eye_blink.png',correct01:base+'eye_correct_01.png',correct02:base+'eye_correct_02.png',correct03:base+'eye_correct_03.png',wrong01:base+'eye_wrong_01.png',wrong02:base+'eye_wrong_02.png'},
    tire:{normal:base+'tire_normal.png',up:base+'tire_up.png',down:base+'tire_down.png'}
  };
  if(id===guestCar.id){
    assets.body.fun01=base+'body_fun_01.png';
    assets.body.fun02=base+'body_fun_02.png';
    assets.eye.fun01=base+'eye_fun_01.png';
    assets.eye.fun02=base+'eye_fun_02.png';
  }
  return [id,assets];
}));
const framePlan={
  normal:{body:'normal',eye:'normal',tire:'normal'},
  blink:{body:'normal',eye:'blink',tire:'normal'},
  correct01:{body:'correct01',eye:'correct01',tire:'up'},
  correct02:{body:'correct02',eye:'correct02',tire:'down'},
  correct03:{body:'correct03',eye:'correct03',tire:'normal'},
  wrong01:{body:'wrong01',eye:'wrong01',tire:'down'},
  wrong02:{body:'wrong02',eye:'wrong02',tire:'up'},
  fun01:{body:'fun01',eye:'fun01',tire:'down'},
  fun02:{body:'fun02',eye:'fun02',tire:'up'}
};
const el={title:document.getElementById('title'),play:document.getElementById('play'),start:document.getElementById('start'),msg:document.getElementById('msg'),sample:document.getElementById('sample'),choices:document.getElementById('choices')};
let sample=null,last=null,lock=false,showTimer=null,sampleController=null,activeControllers=[],choiceControllers=new WeakMap(),guestThisQuestion=false,guestAssetsReady=false,guestAssetsFailed=false,questionsUntilGuest=nextGuestInterval();
const preloadCache=new Map(),carPreloadCache=new Map();
function fallback(c){return `<svg class="fallbackSvg" viewBox="0 0 320 230" aria-hidden="true"><rect width="320" height="230" fill="none"/><rect x="45" y="70" width="230" height="105" rx="42" fill="${c.color}" stroke="#333" stroke-width="8"/><rect x="105" y="35" width="145" height="80" rx="24" fill="${c.color}" stroke="#333" stroke-width="8"/><rect x="120" y="52" width="55" height="42" rx="10" fill="#9fe7ff"/><rect x="185" y="52" width="50" height="42" rx="10" fill="#9fe7ff"/><circle cx="138" cy="73" r="15" fill="#fff"/><circle cx="198" cy="73" r="15" fill="#fff"/><circle cx="142" cy="78" r="8" fill="#111"/><circle cx="202" cy="78" r="8" fill="#111"/><circle cx="95" cy="178" r="31" fill="#222"/><circle cx="235" cy="178" r="31" fill="#222"/><circle cx="95" cy="178" r="14" fill="#eee"/><circle cx="235" cy="178" r="14" fill="#eee"/></svg>`}
function car(c,src=c.src){return `<span class="car"><img class="assetImg" src="${src}" alt="" draggable="false" onload="this.classList.add('ready')" onerror="var f=this.nextElementSibling;this.remove();if(f)f.classList.add('ready')">${fallback(c)}</span>`}
function layerImg(cls,src){return `<img class="carLayer ${cls}" src="${src}" alt="" draggable="false" onerror="var r=this.closest('.carAnimated');if(r)r.classList.add('layerFallback')">`}
function layeredCar(c,i=0,{extraClass='',effect=true}={}){let a=animatedCarAssets[c.id];if(!a)return car(c);let e=effect?`<img class="carLayer effectLayer" alt="" draggable="false" onerror="this.classList.remove('on')">`:'';let fb=c.src?`<img class="assetImg fallbackFull" src="${c.src}" alt="" draggable="false" onload="this.classList.add('ready')" onerror="this.remove()">`:'';return `<span class="car carAnimated ${extraClass}" data-car-id="${c.id}" style="--idle-delay:${(-i*.42).toFixed(2)}s"><span class="carPose"><span class="carLayerCanvas">${layerImg('bodyLayer',a.body.normal)}${layerImg('tireLayer',a.tire.normal)}${layerImg('eyeLayer',a.eye.normal)}${e}</span>${fb}</span></span>`}
function animatedCar(c,i){return layeredCar(c,i)}
function sampleCar(c){return `<span class="sampleDriveWrap"><span class="sampleMirror">${layeredCar(c,0,{extraClass:'sampleCar',effect:false})}</span></span>`}
function rnd(n){return Math.floor(Math.random()*n)}function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function carAssetUrls(id){let a=animatedCarAssets[id];return a?[...Object.values(a.body),...Object.values(a.eye),...Object.values(a.tire)]:[]}
function preloadImage(src){if(!src)return Promise.resolve(false);if(!preloadCache.has(src)){preloadCache.set(src,new Promise(resolve=>{let img=new Image();img.onload=()=>resolve(true);img.onerror=()=>resolve(false);img.src=src}))}return preloadCache.get(src)}
function preloadCarAssets(id){if(!carPreloadCache.has(id)){carPreloadCache.set(id,Promise.all(carAssetUrls(id).map(preloadImage)).then(r=>r.every(Boolean)))}return carPreloadCache.get(id)}
function preloadGuestAssets(){return Promise.all([preloadCarAssets(guestCar.id),preloadImage(animatedEffects.fun)]).then(r=>{guestAssetsReady=r.every(Boolean);guestAssetsFailed=!guestAssetsReady;return guestAssetsReady})}
function preloadAnimatedAssets(){animatedBaseColors.forEach(preloadCarAssets);preloadImage(animatedEffects.correct);preloadImage(animatedEffects.wrong);preloadGuestAssets()}
function nextGuestInterval(){return 18+rnd(15)}
function shouldShowGuest(){if(!guestAssetsReady)return false;questionsUntilGuest--;if(questionsUntilGuest>0)return false;questionsUntilGuest=nextGuestInterval();return true}
class LayeredCarController{
  constructor(button,c,index,{blink=true}={}){this.button=button;this.car=c;this.color=c.id;this.assets=animatedCarAssets[c.id];this.root=button.querySelector('.carAnimated');this.pose=button.querySelector('.carPose');this.img={tire:button.querySelector('.tireLayer'),body:button.querySelector('.bodyLayer'),eye:button.querySelector('.eyeLayer'),effect:button.querySelector('.effectLayer')};this.timers=[];this.blinkTimer=null;this.state='idle';this.disposed=false;this.fallback=!this.assets;this.wrongBusy=false;this.funBusy=false;this.index=index;this.blink=blink}
  init(){if(this.fallback){this.useFallback();return}this.setFrame('normal');preloadCarAssets(this.color).then(ok=>{if(this.disposed)return;if(ok){this.root.classList.add('layeredReady');this.root.classList.remove('layerFallback');this.setFrame('normal');if(this.blink)this.scheduleBlink()}else this.useFallback()})}
  useFallback(){this.fallback=true;if(this.root){this.root.classList.add('layerFallback');this.root.classList.remove('layeredReady')}}
  clearTimers(){this.timers.forEach(clearTimeout);this.timers=[];if(this.blinkTimer){clearTimeout(this.blinkTimer);this.blinkTimer=null}}
  cleanup(){this.disposed=true;this.clearTimers()}
  setFrame(name){if(this.fallback||!this.assets)return;let f=framePlan[name]||framePlan.normal;this.img.tire.src=this.assets.tire[f.tire];this.img.body.src=this.assets.body[f.body];this.img.eye.src=this.assets.eye[f.eye]}
  scheduleBlink(){if(this.disposed||this.fallback||this.state!=='idle')return;this.blinkTimer=setTimeout(()=>{if(this.disposed||this.state!=='idle')return;this.state='blink';this.setFrame('blink');this.timers.push(setTimeout(()=>{if(this.disposed)return;this.setFrame('normal');this.state='idle';this.scheduleBlink()},120))},3500+Math.random()*3500)}
  showEffect(kind){if(this.fallback||!this.img.effect)return;this.img.effect.src=animatedEffects[kind]||'';this.img.effect.classList.remove('on');void this.img.effect.offsetWidth;this.img.effect.classList.add('on')}
  hideEffect(){if(this.img.effect)this.img.effect.classList.remove('on')}
  runSequence(kind,steps,poseClass,doneMs){this.clearTimers();this.state=kind;this.pose.classList.remove('correctPose','wrongPose','funPose');void this.pose.offsetWidth;this.pose.classList.add(poseClass);this.showEffect(kind);let elapsed=0;this.setFrame(steps[0][0]);for(let i=1;i<steps.length;i++){elapsed+=steps[i-1][1];this.timers.push(setTimeout(()=>this.setFrame(steps[i][0]),elapsed))}let frameMs=steps.reduce((sum,s)=>sum+s[1],0);this.timers.push(setTimeout(()=>this.setFrame('normal'),frameMs));this.timers.push(setTimeout(()=>{this.pose.classList.remove(poseClass);this.hideEffect();this.state='idle';this.wrongBusy=false;this.funBusy=false;if(this.blink)this.scheduleBlink()},doneMs))}
  playCorrect(){this.wrongBusy=false;this.runSequence('correct',[['correct01',120],['correct02',220],['correct03',180]],'correctPose',700)}
  playWrong(){if(this.wrongBusy)return false;this.wrongBusy=true;this.runSequence('wrong',[['wrong01',90],['wrong02',140],['wrong01',90]],'wrongPose',360);return true}
  playFun(){if(this.funBusy||this.fallback||!this.assets.body.fun01||!this.assets.eye.fun01)return false;this.funBusy=true;this.runSequence('fun',[['fun01',100],['fun01',100],['fun02',200],['fun01',100],['fun01',100]],'funPose',640);return true}
}
function cleanupControllers(){if(sampleController){sampleController.cleanup();sampleController=null}activeControllers.forEach(c=>c.cleanup());activeControllers=[];choiceControllers=new WeakMap()}
function resetChoiceEntry(){el.choices.getAnimations().forEach(a=>a.cancel());el.choices.classList.remove('groupIn');el.choices.style.animation='';el.choices.style.transform='';el.choices.onanimationend=null}
function stopChoiceEntry(){if(!el.choices.classList.contains('groupIn'))return;let entry=el.choices.getAnimations().find(a=>a.animationName==='choiceGroupDrive');if(entry)entry.pause();let t=getComputedStyle(el.choices).transform;el.choices.getAnimations().forEach(a=>{if(a.animationName==='choiceGroupDrive')a.cancel()});el.choices.style.animation='none';el.choices.style.transform=t==='none'?'translateX(0)':t;el.choices.classList.remove('groupIn');el.choices.onanimationend=null}
function q(){lock=false;if(showTimer)clearTimeout(showTimer);cleanupControllers();resetChoiceEntry();el.choices.innerHTML='';guestThisQuestion=shouldShowGuest();let pool=cars.filter(c=>c.id!==last);sample=pool[rnd(pool.length)]||cars[0];last=sample.id;el.sample.innerHTML=sampleCar(sample);let s=el.sample.firstChild;sampleController=new LayeredCarController(s,sample,0,{blink:false});sampleController.init();s.classList.add('sampleIn');s.onanimationend=()=>s.classList.remove('sampleIn');el.msg.textContent='';showTimer=setTimeout(show,3200)}
function show(){let others=shuffle(cars.filter(c=>c.id!==sample.id));let choices=guestThisQuestion&&guestAssetsReady?[sample,others[0],guestCar]:[sample,...others.slice(0,2)];shuffle(choices).forEach((c,i)=>{let b=document.createElement('button');b.className='choice';b.type='button';b.innerHTML=animatedCar(c,i);let ctrl=new LayeredCarController(b,c,i);choiceControllers.set(b,ctrl);activeControllers.push(ctrl);ctrl.init();b.onclick=()=>tap(b,c);el.choices.appendChild(b)});void el.choices.offsetWidth;el.choices.classList.add('groupIn');el.choices.onanimationend=e=>{if(e.animationName==='choiceGroupDrive')resetChoiceEntry()};lock=false}
function tap(b,c){if(lock)return;if(c.guest)guest(b);else if(c.id===sample.id)ok(b);else ng(b)}
function guest(b){let ctrl=choiceControllers.get(b);if(ctrl)ctrl.playFun()}
function ng(b){let ctrl=choiceControllers.get(b);if(ctrl)ctrl.playWrong();else{b.classList.remove('wiggle');void b.offsetWidth;b.classList.add('wiggle')}el.msg.textContent=Math.random()<.5?'あれれ？':'もういちど！'}
function ok(b){lock=true;stopChoiceEntry();let ctrl=choiceControllers.get(b);if(ctrl)ctrl.playCorrect();else b.classList.add('jump');if(sampleController)sampleController.playCorrect();[...el.choices.children].forEach(x=>{if(x!==b)x.classList.add('fade')});el.msg.textContent='やったー！';setTimeout(q,1700)}
function spark(b){let r=b.getBoundingClientRect();let cx=r.left+r.width/2,cy=r.top+r.height/2;for(let i=0;i<10;i++){let s=document.createElement('span');s.className='spark';s.textContent='✨';s.style.left=cx+'px';s.style.top=cy+'px';let a=Math.PI*2*i/10,d=60+Math.random()*70;s.style.setProperty('--x',Math.cos(a)*d+'px');s.style.setProperty('--y',Math.sin(a)*d-45+'px');document.body.appendChild(s);s.onanimationend=()=>s.remove()}}
preloadAnimatedAssets();
el.start.onclick=()=>{el.title.classList.add('hide');el.play.classList.remove('hide');q()};
</script>
</body></html>
