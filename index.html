<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>くるまどれかな？</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation}body{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",Meiryo,sans-serif;color:#4a3f35;background:#77d6ff}.app{position:fixed;inset:0;overflow:hidden;background:linear-gradient(#75d7ff 0 42%,#8ddd65 42% 48%,#b8b8b8 48% 100%)}.app:before{content:"";position:absolute;left:0;right:0;top:68%;height:18px;background:repeating-linear-gradient(90deg,transparent 0 70px,#fff 70px 130px,transparent 130px 200px);opacity:.9}.cloud{position:absolute;background:white;border-radius:999px;opacity:.9}.cloud:before,.cloud:after{content:"";position:absolute;border-radius:50%;background:white}.c1{left:9%;top:9%;width:130px;height:50px}.c1:before{width:55px;height:55px;left:25px;top:-25px}.c1:after{width:50px;height:50px;right:22px;top:-18px}.c2{right:11%;top:12%;width:120px;height:44px}.c2:before{width:50px;height:50px;left:22px;top:-23px}.c2:after{width:46px;height:46px;right:22px;top:-14px}.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center}.hide{display:none!important}.title{justify-content:center;gap:3vh;background:rgba(255,255,255,.25)}.logo{font-weight:900;font-size:clamp(40px,10vw,92px);letter-spacing:.02em;text-shadow:0 6px 0 #fff,6px 0 0 #fff,-6px 0 0 #fff,0 -6px 0 #fff,0 12px 12px rgba(0,0,0,.16)}.logo span:nth-child(1){color:#ef3f26}.logo span:nth-child(2){color:#1d78d6}.logo span:nth-child(3){color:#43ad36}.lead,.msg{font-weight:900;background:#fffdf6;border:3px solid rgba(74,63,53,.15);border-radius:999px;box-shadow:0 4px 0 rgba(0,0,0,.12);text-align:center}.lead{font-size:clamp(18px,4vw,32px);padding:.45em 1.2em}.start{font:inherit;font-size:clamp(26px,6vw,46px);font-weight:900;color:white;background:#e8452a;border:0;border-radius:999px;min-width:42vw;min-height:13vh;box-shadow:0 7px 0 #ad301a}.start:active{transform:translateY(4px);box-shadow:0 3px 0 #ad301a}.play{justify-content:space-between;padding:2vh 3vw}.msg{font-size:clamp(16px,4vw,30px);padding:.35em 1.1em;z-index:5}.sampleLane,.choiceLane{width:100%;display:flex;align-items:center;justify-content:center}.sampleLane{height:35vh}.choiceLane{height:41vh;gap:4vw;align-items:flex-end;padding-bottom:2vh}.car{width:clamp(120px,27vw,260px);height:auto;filter:drop-shadow(0 8px 4px rgba(0,0,0,.16))}.sample .car{width:clamp(130px,30vw,280px)}.choice{border:0;background:transparent;border-radius:28px;padding:2vw;cursor:pointer}.choice .car{width:clamp(110px,25vw,240px)}.enter{animation:enter .45s ease both}.sampleIn{animation:sampleIn .6s ease-out both}.wiggle{animation:wiggle .5s ease}.jump{animation:jump .72s cubic-bezier(.2,1.4,.35,1)}.fade{opacity:.25;transform:scale(.88);transition:.3s}.spark{position:absolute;font-size:clamp(22px,5vw,40px);animation:spark .8s ease-out forwards;pointer-events:none}.rotate{display:none;position:fixed;inset:0;z-index:20;align-items:center;justify-content:center;text-align:center;background:#fffdf6;font-size:7vw;font-weight:900}@media(orientation:portrait){.rotate{display:flex}.app{filter:blur(3px)}}@keyframes enter{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}@keyframes sampleIn{from{transform:translateX(-55vw);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes wiggle{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px) rotate(-2deg)}50%{transform:translateX(9px) rotate(2deg)}75%{transform:translateX(-6px) rotate(-1deg)}}@keyframes jump{0%,100%{transform:translateY(0) scale(1)}35%{transform:translateY(-34px) scale(1.08)}60%{transform:translateY(4px) scale(.98)}}@keyframes spark{from{opacity:1;transform:translate(0,0) scale(.7)}to{opacity:0;transform:translate(var(--x),var(--y)) scale(1.25)}}
</style>
</head>
<body>
<div class="app" id="app"><div class="cloud c1"></div><div class="cloud c2"></div>
<section class="screen title" id="title"><h1 class="logo"><span>くるま</span><span>どれ</span><span>かな?</span></h1><p class="lead">くるまを えらんで あそぼう！</p><button class="start" id="start">スタート</button></section>
<section class="screen play hide" id="play"><div class="msg" id="msg">このくるまと おなじ くるまを えらんでね</div><div class="sampleLane"><div class="sample" id="sample"></div></div><div class="choiceLane" id="choices"></div></section>
</div><div class="rotate">📱↻<br>よこむきに してね</div>
<script>
const cars=[['red','#ef3020'],['blue','#1976d2'],['yellow','#f5bd16'],['green','#45aa35']];
const el={title:document.getElementById('title'),play:document.getElementById('play'),start:document.getElementById('start'),msg:document.getElementById('msg'),sample:document.getElementById('sample'),choices:document.getElementById('choices')};
let sample=null,last=null,lock=false;
function car(c){return `<svg class="car" viewBox="0 0 320 230" aria-hidden="true"><rect width="320" height="230" fill="none"/><rect x="45" y="70" width="230" height="105" rx="42" fill="${c[1]}" stroke="#333" stroke-width="8"/><rect x="105" y="35" width="145" height="80" rx="24" fill="${c[1]}" stroke="#333" stroke-width="8"/><rect x="120" y="52" width="55" height="42" rx="10" fill="#9fe7ff"/><rect x="185" y="52" width="50" height="42" rx="10" fill="#9fe7ff"/><circle cx="138" cy="73" r="15" fill="#fff"/><circle cx="198" cy="73" r="15" fill="#fff"/><circle cx="142" cy="78" r="8" fill="#111"/><circle cx="202" cy="78" r="8" fill="#111"/><circle cx="95" cy="178" r="31" fill="#222"/><circle cx="235" cy="178" r="31" fill="#222"/><circle cx="95" cy="178" r="14" fill="#eee"/><circle cx="235" cy="178" r="14" fill="#eee"/></svg>`}
function rnd(n){return Math.floor(Math.random()*n)}function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function q(){lock=true;el.choices.innerHTML='';let pool=cars.filter(c=>c[0]!==last);sample=pool[rnd(pool.length)]||cars[0];last=sample[0];el.sample.innerHTML=car(sample);el.sample.firstChild.classList.add('sampleIn');el.msg.textContent='このくるまと おなじ くるまを えらんでね';setTimeout(show,1200)}
function show(){let others=shuffle(cars.filter(c=>c[0]!==sample[0])).slice(0,2);shuffle([sample,...others]).forEach(c=>{let b=document.createElement('button');b.className='choice enter';b.type='button';b.innerHTML=car(c);b.onclick=()=>tap(b,c);el.choices.appendChild(b)});lock=false}
function tap(b,c){if(lock)return;if(c[0]===sample[0])ok(b);else ng(b)}
function ng(b){lock=true;b.classList.remove('wiggle');void b.offsetWidth;b.classList.add('wiggle');el.msg.textContent=Math.random()<.5?'えへへ、ぼくじゃないよ〜':'もういちど！';setTimeout(()=>lock=false,650)}
function ok(b){lock=true;b.classList.add('jump');[...el.choices.children].forEach(x=>{if(x!==b)x.classList.add('fade')});el.msg.textContent='やったー！ おなじだね！';spark(b);setTimeout(q,1700)}
function spark(b){let r=b.getBoundingClientRect();let cx=r.left+r.width/2,cy=r.top+r.height/2;for(let i=0;i<10;i++){let s=document.createElement('span');s.className='spark';s.textContent='✨';s.style.left=cx+'px';s.style.top=cy+'px';let a=Math.PI*2*i/10,d=60+Math.random()*70;s.style.setProperty('--x',Math.cos(a)*d+'px');s.style.setProperty('--y',Math.sin(a)*d-45+'px');document.body.appendChild(s);s.onanimationend=()=>s.remove()}}
el.start.onclick=()=>{el.title.classList.add('hide');el.play.classList.remove('hide');q()};
</script>
</body></html>
