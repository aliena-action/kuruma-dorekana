name: Remove support noindex

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/remove-support-noindex.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove noindex and self-delete
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('support.html')
          s = p.read_text(encoding='utf-8')
          target = '<meta name="robots" content="noindex,nofollow">\n'
          if target not in s:
              raise SystemExit('target noindex tag not found')
          p.write_text(s.replace(target, '', 1), encoding='utf-8')
          Path('.github/workflows/remove-support-noindex.yml').unlink()
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add support.html .github/workflows/remove-support-noindex.yml
          git commit -m "Allow support page indexing"
          git push
