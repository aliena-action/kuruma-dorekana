name: Temporary check feedback

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for export endpoint and download
        shell: bash
        run: |
          set -euo pipefail
          url='https://kuruma-dorekana.pages.dev/api/feedback-export-temp?token=i2xBmcwvo2rwLtG-H-6egUKb9QHpmudi_LQaZX6QqxA'
          for attempt in $(seq 1 36); do
            status=$(curl --silent --show-error --location --output feedback.json --write-out '%{http_code}' "$url" || true)
            if [ "$status" = "200" ] && jq -e '.ok == true' feedback.json >/dev/null 2>&1; then
              jq . feedback.json > feedback.pretty.json
              mv feedback.pretty.json feedback.json
              exit 0
            fi
            echo "Attempt ${attempt}: HTTP ${status}"
            sleep 10
          done
          cat feedback.json >&2 2>/dev/null || true
          exit 1
      - name: Upload export
        uses: actions/upload-artifact@v4
        with:
          name: current-feedback-export
          path: feedback.json
          retention-days: 1
